services:
  - type: web
    name: mulit-items-search-tools-for-ruten
    env: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt && playwright install --with-deps
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
