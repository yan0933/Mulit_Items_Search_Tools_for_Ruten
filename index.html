<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>露天多商品搜尋工具</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <div class="container">
        <h1>露天多商品搜尋工具</h1>
        <div class="subcontainer">
            <div class="instructions">
                <h3>使用說明</h3>
                <ul>
                    <li>在右方輸入框中，每行輸入一個商品名稱</li>
                    <li>點擊「搜尋」按鈕開始查詢</li>
                    <li>結果會按賣家分組顯示</li>
                    <li>本工具僅擷取第一頁的搜尋結果</li>
                    <li>可選：輸入賣家 ID 來搜尋特定賣家的商品</li>
                    <li>賣家與分類選項互斥，賣家優先</li>
                </ul>
            </div>
            <div>
                <form class="search-form" id="searchForm">
                    <div class="form-group">
                        <label for="items">商品名稱（每行一個）：</label>
                        <textarea id="items" name="items" placeholder="例如：&#10;iPhone 15&#10;MacBook Pro&#10;AirPods"
                            required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="seller">賣家 ID（選填）：</label>
                        <input type="text" id="seller" name="seller" placeholder="例如：apple_official">
                    </div>
                    <div class="form-group">
                        <label>搜尋分類：</label>
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="cateid" value="" checked>
                                全站搜尋
                            </label>
                            <label>
                                <input type="radio" name="cateid" value="0005">
                                玩具公仔
                            </label>
                        </div>
                    </div>
                    <button type="submit">搜尋商品</button>
                </form>
            </div>
        </div>
        <div class="loading" id="loading">
            <p>正在搜尋中，請稍候...</p>
        </div>

        <div class="error" id="error"></div>

        <div class="results" id="results"></div>
    </div>

    <script>
        document.getElementById('searchForm').addEventListener('submit', async function (e) {
            e.preventDefault();

            const items = document.getElementById('items').value.trim();
            const seller = document.getElementById('seller').value.trim();
            const cateid = document.querySelector('input[name="cateid"]:checked').value;

            if (!items) {
                showError('請輸入至少一個商品名稱');
                return;
            }

            showLoading();
            hideError();
            hideResults();

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        items: items,
                        seller: seller || null,
                        cateid: cateid || null
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                displayResults(data.results);
            } catch (error) {
                showError('搜尋失敗：' + error.message);
            } finally {
                hideLoading();
            }
        });

        function showLoading() {
            document.getElementById('loading').style.display = 'block';
        }

        function hideLoading() {
            document.getElementById('loading').style.display = 'none';
        }

        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        function hideError() {
            document.getElementById('error').style.display = 'none';
        }

        function showResults() {
            document.getElementById('results').style.display = 'block';
        }

        function hideResults() {
            document.getElementById('results').style.display = 'none';
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (!results || Object.keys(results).length === 0) {
                resultsDiv.innerHTML = '<p style="text-align: center; color: #7f8c8d;">未找到相關商品</p>';
                showResults();
                return;
            }

            for (const [seller, products] of Object.entries(results)) {
                const sellerSection = document.createElement('div');
                sellerSection.className = 'seller-section';

                const sellerHeader = document.createElement('div');
                sellerHeader.className = 'seller-header';
                sellerHeader.textContent = `${seller} (${products.length} 件商品)`;
                sellerSection.appendChild(sellerHeader);

                const productList = document.createElement('ul');
                productList.className = 'product-list';

                products.forEach(product => {
                    const productItem = document.createElement('li');
                    productItem.className = 'product-item';

                    const imageHtml = product.image ?
                        `<img src="${product.image}" alt="${product.title}" class="product-image" onerror="this.style.display='none'">` :
                        '<div class="product-image" style="background: #f0f0f0; display: flex; align-items: center; justify-content: center; color: #999;">無圖片</div>';

                    productItem.innerHTML = `
                        ${imageHtml}
                        <div class="product-info">
                            <a href="${product.link}" target="_blank" class="product-title">${product.title}</a>
                            <div class="product-price">NT$ ${product.price.toLocaleString()}</div>
                        </div>
                    `;

                    productList.appendChild(productItem);
                });

                sellerSection.appendChild(productList);
                resultsDiv.appendChild(sellerSection);
            }

            showResults();
        }
    </script>
</body>

</html>
