<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>露天商品抓取測試</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      line-height: 1.6;
    }

    .loading {
      color: #007bff;
      display: none;
      font-weight: bold;
      margin: 10px 0;
    }

    .seller-block {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 20px;
      border-radius: 8px;
    }

    .seller-name {
      color: #d32f2f;
      border-bottom: 2px solid #eee;
      padding-bottom: 5px;
    }

    ul {
      list-style-type: none;
      padding-left: 0;
    }

    li {
      margin-bottom: 8px;
    }

    a {
      text-decoration: none;
      color: #0056b3;
    }

    a:hover {
      text-decoration: underline;
    }

    /* 卡片容器：自動適應寬度，每列最少 250px */
    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      padding: 20px 0;
    }

    /* 單個卡片樣式 */
    .product-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #eee;
      overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    /* 圖片容器：固定比例 1:1 */
    .card-img-wrapper {
      width: 100%;
      height: 150px;
      /* 你可以根據需求調整固定高度 */
      background: #f8f8f8;
      /* 背景色，預防透明圖或尺寸不足 */
      display: flex;
      /* 使用 Flexbox */
      justify-content: center;
      /* 水平置中 */
      align-items: center;
      /* 垂直置中 */
      overflow: hidden;
    }

    .card-img-wrapper img {
      height: 100%;
      /* 高度撐滿容器 */
      width: auto;
      /* 寬度自動縮放，保持比例 */
      max-width: 100%;
      /* 預防圖片過寬超出容器 */
      display: block;
    }

    /* 卡片內容區 */
    .card-content {
      padding: 15px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .card-title {
      font-size: 0.95rem;
      color: #333;
      text-decoration: none;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      /* 最多顯示兩行文字 */
      -webkit-box-orient: vertical;
      overflow: hidden;
      height: 2.8rem;
      line-height: 1.4;
    }

    .card-price {
      font-size: 1.2rem;
      color: #e62117;
      font-weight: bold;
      margin-top: auto;
      /* 將價格推到底部 */
    }

    .seller-badge {
      font-size: 0.8rem;
      color: #666;
      background: #f0f0f0;
      padding: 2px 8px;
      border-radius: 10px;
      display: inline-block;
      margin-top: 5px;
    }

    /* 條列式容器 */
    .results-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 10px 0;
    }

    /* 單個條列項目 */
    .product-item {
      display: flex;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 4px;
      overflow: hidden;
      transition: background 0.2s;
      height: 120px;
      /* 固定高度，讓條列整齊 */
    }

    .product-item:hover {
      background: #f9f9f9;
      border-color: #ddd;
    }

    /* 左側圖片區域：固定 100px 寬度 */
    .item-img-wrapper {
      width: 100px;
      height: 100px;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      /* 水平置中 */
      align-items: center;
      /* 垂直置中 */
      flex-shrink: 0;
      /* 防止被壓縮 */
    }

    .item-img-wrapper img {
      width: auto;
      /* 高度撐滿 */
      max-height: 100%;
      /* 寬度隨比例 */
      max-width: 100%;
      /* 確保不超出 150px */
      display: block;
    }

    /* 右側資訊區域 */
    .item-info {
      padding: 12px 15px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      /* 讓標題在頂部，價格在底部 */
      flex-grow: 1;
      min-width: 0;
      /* 防止長文字撐破 Flex 容器 */
    }

    .item-title {
      font-size: 1rem;
      color: #333;
      text-decoration: none;
      font-weight: 500;
      line-height: 1.4;
      /* 多行截斷 */
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .item-detail {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
    }

    .item-price {
      font-size: 1.2rem;
      color: #d00;
      font-weight: bold;
    }

    .item-seller-tag {
      font-size: 0.8rem;
      color: #777;
      background: #eee;
      padding: 2px 8px;
      border-radius: 3px;
    }
  </style>
</head>

<body>
  <h1>露天多商品搜尋 (JSON 版)</h1>
  <div>
    <textarea id="items" rows="5" placeholder="每行輸入一個商品名稱" style="width: 100%; max-width: 500px;"></textarea><br>
    <input type="text" id="seller" placeholder="指定賣家帳號 (可選)" style="width: 200px; margin: 10px 0;"><br>
    <button id="searchBtn" onclick="doSearch()">開始搜尋</button>
  </div>

  <div id="loadingStatus" class="loading">正在搜尋並處理資料，請稍候...</div>
  <div id="resultsContainer" style="margin-top: 20px;"></div>

  <script>
    async function doSearch() {
      const itemsVal = document.getElementById('items').value;
      const sellerVal = document.getElementById('seller').value;
      const btn = document.getElementById('searchBtn');
      const loading = document.getElementById('loadingStatus');
      const container = document.getElementById('resultsContainer');

      if (!itemsVal.trim()) return alert("請輸入商品名稱！");

      // UI 狀態切換
      btn.disabled = true;
      loading.style.display = 'block';
      container.innerHTML = '';

      try {
        const response = await fetch('/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ items: itemsVal, seller: sellerVal })
        });

        const data = await response.json();
        renderResults(data.results);
      } catch (err) {
        console.error(err);
        alert("搜尋失敗，請檢查後端連線。");
      } finally {
        btn.disabled = false;
        loading.style.display = 'none';
      }
    }

    function renderResults(results) {
      const container = document.getElementById('resultsContainer');
      const entries = Object.entries(results);

      if (entries.length === 0) {
        container.innerHTML = '<p>查無相關商品。</p>';
        return;
      }

      //   entries.forEach(([seller, items]) => {
      //     const sellerSection = document.createElement('div');
      //     sellerSection.className = 'seller-section';
      //     sellerSection.style.marginBottom = '40px';

      //     // 賣家標題
      //     sellerSection.innerHTML = `
      //     <h2 style="border-left: 5px solid #0066cc; padding-left: 15px; margin-bottom: 20px;">
      //         ${seller} <span style="font-size: 0.9rem; color: #888;">(${items.length} 件商品)</span>
      //     </h2>
      //     <div class="results-grid" id="grid-${seller.replace(/\s+/g, '')}"></div>
      // `;
      //     container.appendChild(sellerSection);

      //     const gridContainer = sellerSection.querySelector('.results-grid');

      //     // 產生卡片 HTML
      //     gridContainer.innerHTML = items.map(item => {
      //       const imgSrc = item.image || "https://via.placeholder.com/300?text=No+Image";

      //       return `
      //         <div class="product-card">
      //             <div class="card-img-wrapper">
      //                 <img src="${imgSrc}" alt="${item.title}" loading="lazy">
      //             </div>
      //             <div class="card-content">
      //                 <a href="${item.link}" target="_blank" class="card-title" title="${item.title}">
      //                     ${item.title}
      //                 </a>
      //                 <div class="card-price">$${item.price}</div>
      //             </div>
      //         </div>
      //     `;
      //     }).join('');
      //   });
      entries.forEach(([seller, items]) => {
        const sellerSection = document.createElement('div');
        sellerSection.style.marginBottom = '30px';

        // 賣家標題
        sellerSection.innerHTML = `
        <h2 style="font-size: 1.2rem; color: #444; border-bottom: 2px solid #0066cc; padding-bottom: 5px; margin-bottom: 15px;">
            ${seller} <span style="font-size: 0.9rem; color: #999; font-weight: normal;">(${items.length} 件商品)</span>
        </h2>
        <div class="results-list"></div>
    `;
        container.appendChild(sellerSection);

        const listContainer = sellerSection.querySelector('.results-list');

        // 產生條列 HTML
        listContainer.innerHTML = items.map(item => {
          const imgSrc = item.image || "https://via.placeholder.com/150?text=No+Image";

          return `
            <div class="product-item">
                <div class="item-img-wrapper">
                    <img src="${imgSrc}" alt="${item.title}" loading="lazy">
                </div>
                <div class="item-info">
                    <a href="${item.link}" target="_blank" class="item-title" title="${item.title}">
                        ${item.title}
                    </a>
                    <div class="item-detail">
                        <span class="item-price">$${item.price}</span>
                    </div>
                </div>
            </div>
        `;
        }).join('');
      });
    }
  </script>
</body>

</html>
